<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Store</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sekuya&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="header">
      <h1 class="header__titulo">Food Store</h1>
      <nav class="nav">
        <ul class="nav__lista">
          <li class="nav__item">
            <a href="#" class="nav__link"
              ><span class="material-symbols-outlined"> home </span>Inicio</a
            >
          </li>
          <li class="nav__item">
            <a href="#" class="nav__link"
              ><span class="material-symbols-outlined"> shopping_bag </span>Mis
              Pedidos</a
            >
          </li>
          <li class="nav__item">
            <a href="#" class="nav__link"
              ><span class="material-symbols-outlined"> shopping_cart </span
              >Carrito</a
            >
          </li>
          <li class="nav__item">
            <a href="./admin.html" class="nav__link"
              ><span class="material-symbols-outlined">
                admin_panel_settings </span
              >Panel Admin</a
            >
          </li>
        </ul>
      </nav>
    </header>
    <aside class="sidebar">
      <h2 class="sidebar__titulo">Categorías</h2>
      <ul id="lista-categorias" class="sidebar__lista"></ul>
    </aside>
    <main class="main">
      <form id="formulario" class="form" action="#">
        <label class="form__label" for="buscador">Buscar productos:</label>
        <input
          class="form__input"
          type="text"
          id="buscador"
          placeholder="Ej: Hamburguesa doble"
        />
        <button type="submit" class="form__btn">Buscar</button>
      </form>
      <section id="contenedor-productos" class="productos-grid"></section>
    </main>
    <footer class="footer">
      <p class="footer__texto">
        &copy 2026 Food Store. Todos los derechos reservados.
      </p>
      <p class="footer__contacto">
        Contacto:
        <a class="footer__link" href="mailto:info@foodstore.com"
          >info@foodstore.com</a
        >
      </p>
    </footer>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
